<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Кохана 💗</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">
    <h1>Я закохуюсь у тебе вже</h1>

    <div class="time-box">
        <div><span id="days">0</span><p>днів</p></div>
        <div><span id="hours">0</span><p>годин</p></div>
        <div><span id="minutes">0</span><p>хвилин</p></div>
        <div><span id="seconds">0</span><p>секунд</p></div>
    </div>

    <p class="real-time">насправді трішки довше</p>

    <div class="heart" onclick="showLove()">❤️</div>

    <div id="message">Натисни на серце</div>
</div>

<script src="script.js"></script>
</body>
</html>
